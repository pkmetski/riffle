name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Download Gradle wrapper jar
        run: |
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar"
      - uses: actions/cache@v4
        with:
          path: app/src/main/assets/fonts
          key: fonts-v1-${{ hashFiles('Makefile') }}
          restore-keys: fonts-v1-
      - run: make fonts
      - run: ./gradlew assembleDebug

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: true
      - name: Download Gradle wrapper jar
        run: |
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar"
      - uses: actions/cache@v4
        with:
          path: app/src/main/assets/fonts
          key: fonts-v1-${{ hashFiles('Makefile') }}
          restore-keys: fonts-v1-
      - run: make fonts
      - run: ./gradlew lint
      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: "**/build/reports/lint-results-*.html"
          if-no-files-found: ignore

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: true
      - name: Download Gradle wrapper jar
        run: |
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar"
      - uses: actions/cache@v4
        with:
          path: app/src/main/assets/fonts
          key: fonts-v1-${{ hashFiles('Makefile') }}
          restore-keys: fonts-v1-
      - run: make fonts
      - run: ./gradlew test
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/
            core/*/build/reports/tests/
          if-no-files-found: ignore

  harness-test:
    name: Harness Tests (Emulator)
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: true
      - name: Download Gradle wrapper jar
        run: |
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar"
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/cache@v4
        with:
          path: app/src/main/assets/fonts
          key: fonts-v1-${{ hashFiles('Makefile') }}
          restore-keys: fonts-v1-
      - run: make fonts
      - name: Run harness tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          script: ./gradlew :app:connectedDebugAndroidTest
      - name: Upload harness test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: harness-test-reports
          path: app/build/reports/androidTests/
          if-no-files-found: ignore

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: true
      - name: Download Gradle wrapper jar
        run: |
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar"
      - uses: actions/cache@v4
        with:
          path: app/src/main/assets/fonts
          key: fonts-v1-${{ hashFiles('Makefile') }}
          restore-keys: fonts-v1-
      - run: make fonts
      - run: ./gradlew :core:data:testDebugUnitTest -PintegrationTests
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-reports
          path: core/data/build/reports/tests/
          if-no-files-found: ignore
